  <line x1="40" y1="34" x2="40" y2="90" stroke="#533483" stroke-width="2"/>
  <!-- Lines on page -->
  <line x1="46" y1="46" x2="66" y2="46" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="54" x2="62" y2="54" stroke="#533483" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="62" x2="64" y2="62" stroke="#533483" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="70" x2="58" y2="70" stroke="#533483" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bridge / connection arrow -->
