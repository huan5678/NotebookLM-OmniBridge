[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "*/site-packages/*"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if __name__ == .__main__."]
